<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beatmaker Drum Pad</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="drum-pad-container">
        <button class="drum-pad" id="kick-drum">
            <span>Kick Drum</span>
        </button>
        <button class="drum-pad" id="hi-hat">
            <span>Hi-Hat</span>
        </button>
        <button class="drum-pad" id="snare-drum">
            <span>Snare Drum</span>
        </button>
        <button class="drum-pad" id="percussive-synth">
            <span>Percussive Synth</span>
        </button>
        <div id="output">
            <p>Press a drum pad to play</p>
            <p>Hold a drum pad to sustain</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
