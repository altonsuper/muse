<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game 1 - Counter Click</title>
    <style>
      body { font-family: Arial, sans-serif; background: #111; color: #f2f2f2; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
      #game { text-align: center; }
      button { margin-top: 16px; padding: 10px 18px; font-size: 16px; }
    </style>
  </head>
  <body>
    <div id="game">
      <h1>Game 1 - Counter Click</h1>
      <div><p>Click the button to increase the counter.</p><p>Count: <span id="count">0</span></p></div>
      <button id="action">Click me</button>
    </div>
    <script>
const button = document.getElementById('action');
const countElement = document.getElementById('count');
let count = 0;
button.textContent = 'Tap me';
button.addEventListener('click', () => {
  count += 1;
  countElement.textContent = count;
});
    </script>
  </body>
</html>
