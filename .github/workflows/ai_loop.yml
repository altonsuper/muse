name: Ron-GIT AI Loop

on:
  push:
    branches:
      - main

jobs:
  run-architect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT_TOKEN || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run architect agent
        run: node agent/architect_agent.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ENABLE_GROQ: True

      - name: Commit and push changes
        run: |
          git config --global user.name "ron_GIT Bot"
          git config --global user.email "bot@ron-git.ai"
          git add output/
          git add -f aianswer.log status_monitor.txt .quota.json memory/
          git commit -m "AI Update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_PAT_TOKEN || github.token }}
